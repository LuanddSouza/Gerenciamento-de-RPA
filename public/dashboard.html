<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel RPA</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen font-sans">

    <header class="bg-white/80 backdrop-blur shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
            ⚙️ <span>Painel RPA</span>
        </h1>
        <a href="/logout" class="text-red-500 font-medium hover:text-red-600 transition">Sair</a>
    </header>

    <div class="flex justify-center items-center mt-16 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-xl border border-gray-100">

            <h2 class="text-3xl font-semibold text-gray-800 mb-8 text-center">
                Executar Robô
            </h2>

            <div class="space-y-5">

                <!-- ROBÔ -->
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Robô</label>
                    <select id="robo"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition font-medium"></select>
                </div>

                <!-- ESTABELECIMENTOS -->
                <div>
                    <label class="block text-sm text-gray-500 mb-2">Estabelecimentos</label>

                    <div id="estabelecimentosContainer"
                        class="max-h-52 overflow-y-auto border border-gray-200 rounded-xl p-2 space-y-1">
                    </div>
                </div>

                <!-- DATAS -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Data inicial</label>
                        <input type="date" id="data_inicio"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>

                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Data final</label>
                        <input type="date" id="data_fim"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                </div>

                <!-- STATUS -->
                <div id="status" class="hidden text-center text-sm font-medium"></div>

                <!-- BOTÃO -->
                <button onclick="executar()" id="btn"
                    class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-xl hover:scale-[1.02] hover:shadow-lg transition duration-200 font-semibold">
                    Executar Robô
                </button>

            </div>
        </div>
    </div>

</body>

<script>
    let executando = false;

    async function carregarDados() {
        const robos = await fetch('/robos').then(r => r.json());
        const estabs = await fetch('/estabelecimentos').then(r => r.json());

        const roboSelect = document.getElementById('robo');
        const estContainer = document.getElementById('estabelecimentosContainer');

        // limpar
        roboSelect.innerHTML = '';
        estContainer.innerHTML = '';

        // ROBÔS
        robos.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.innerText = r.nome;
            roboSelect.appendChild(opt);
        });

        // ESTABELECIMENTOS (CHECKBOX)
        estabs.forEach(e => {
            const item = document.createElement('label');

            item.className = `
                flex items-center gap-3 p-3 rounded-xl border border-gray-200 
                cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition
            `;

            item.innerHTML = `
                <input type="checkbox" value="${e.id}" 
                    class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">

                <span class="text-gray-700 font-medium">${e.nome}</span>
            `;

            const checkbox = item.querySelector('input');

            checkbox.addEventListener('change', () => {
                if (checkbox.checked) {
                    item.classList.add('bg-blue-100', 'border-blue-500');
                } else {
                    item.classList.remove('bg-blue-100', 'border-blue-500');
                }
            });

            estContainer.appendChild(item);
        });
    }

    function bloquearUI(msg = 'Robô em execução...') {
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        executando = true;

        btn.disabled = true;
        btn.innerText = 'Executando...';

        status.classList.remove('hidden');
        status.innerText = msg;
        status.className = 'text-blue-600 text-center text-sm font-medium';
    }

    function liberarUI() {
        const btn = document.getElementById('btn');

        executando = false;

        btn.disabled = false;
        btn.innerText = 'Executar Robô';
    }

    async function executar() {
        if (executando) return;

        bloquearUI();

        const status = document.getElementById('status');

        // PEGAR CHECKBOXES
        const checkboxes = document.querySelectorAll('#estabelecimentosContainer input:checked');

        const estabelecimentos = Array.from(checkboxes)
            .map(cb => cb.value);

        const data = {
            robo: document.getElementById('robo').value,
            estabelecimentos,
            data_inicio: document.getElementById('data_inicio').value,
            data_fim: document.getElementById('data_fim').value
        };

        try {
            const res = await fetch('/executar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const json = await res.json();

            if (!res.ok) {
                status.innerText = json.erro || 'Erro ao executar';
                status.className = 'text-red-600 text-center text-sm font-medium';
                liberarUI();
                return;
            }

            status.innerText = 'Robô executado com sucesso!';
            status.className = 'text-green-600 text-center text-sm font-medium';

        } catch (err) {
            status.innerText = 'Erro ao executar o robô';
            status.className = 'text-red-600 text-center text-sm font-medium';
        }

        liberarUI();
    }

    async function verificarStatus() {
        try {
            const res = await fetch('/status');

            if (!res.ok) throw new Error();

            const json = await res.json();

            if (json.executando) {
                bloquearUI('Robô ainda está em execução...');
            }

        } catch {
            console.warn('Erro ao verificar status do robô');
        }
    }

    window.onload = async () => {
        await carregarDados();
        await verificarStatus();
    };
</script>

</html>
