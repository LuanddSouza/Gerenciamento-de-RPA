<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento RPA</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">⚙️ Painel RPA</h1>
        <a href="/logout" class="text-red-500 hover:underline">Sair</a>
    </header>

    <!-- CONTAINER -->
    <div class="flex justify-center items-center mt-10 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">

            <h2 class="text-2xl font-semibold text-gray-700 mb-6 text-center">
                Executar Robô
            </h2>

            <!-- FORM -->
            <div class="space-y-4">

                <!-- ROBÔ -->
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Robô</label>
                    <select id="robo"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>

                <!-- ESTAB -->
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Estabelecimento</label>
                    <select id="estabelecimento"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>

                <!-- DATAS -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Data inicial</label>
                        <input type="date" id="data_inicio"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Data final</label>
                        <input type="date" id="data_fim"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- BOTÃO -->
                <button onclick="executar()" id="btn"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200 font-semibold">
                    Executar
                </button>

            </div>

        </div>
    </div>

</body>

<script>
    async function carregarDados() {
        const robos = await fetch('/robos').then(r => r.json());
        const estabs = await fetch('/estabelecimentos').then(r => r.json());

        const roboSelect = document.getElementById('robo');
        robos.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.innerText = r.nome;
            roboSelect.appendChild(opt);
        });

        const estSelect = document.getElementById('estabelecimento');
        estabs.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.id;
            opt.innerText = e.nome;
            estSelect.appendChild(opt);
        });
    }

    async function executar() {
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = 'Executando...';

        const data = {
            robo: document.getElementById('robo').value,
            estabelecimento: document.getElementById('estabelecimento').value,
            data_inicio: document.getElementById('data_inicio').value,
            data_fim: document.getElementById('data_fim').value
        };

        try {
            const res = await fetch('/executar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const json = await res.json();

            alert(json.mensagem || json.erro);

        } catch (err) {
            alert('Erro ao executar');
        }

        btn.disabled = false;
        btn.innerText = 'Executar';
    }

    carregarDados();
</script>

</html>
