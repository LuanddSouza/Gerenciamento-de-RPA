<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento RPA</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
    
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
      🔐 Login RPA
    </h2>

    <form method="POST" action="/login" class="space-y-4">

      <div>
        <label class="block text-sm text-gray-600 mb-1">Usuário</label>
        <input 
          type="text" 
          name="username" 
          placeholder="Digite seu usuário"
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1">Senha</label>
        <input 
          type="password" 
          name="password" 
          placeholder="Digite sua senha"
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button 
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200 font-semibold"
      >
        Entrar
      </button>

    </form>

    <p class="text-center text-xs text-gray-400 mt-6">
      Sistema interno de automações
    </p>

  </div>

</body>
</html>
